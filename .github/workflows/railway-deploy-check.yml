name: Railway Deploy Status

on:
  push:
    branches:
      - claude/setup-md-mortgage-automation-VQ7KG
    paths-ignore:
      - 'deploy-status.json'

jobs:
  check-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/setup-md-mortgage-automation-VQ7KG
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Railway to pick up push
        run: sleep 90

      - name: Query Railway deployment status
        id: railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Hardcoded IDs — no lookup needed
          PROJECT_ID="c6b32bb9-cb3c-454e-aab3-1b8ecefa320a"
          SERVICE_ID="73341e75-b9ea-412c-b0ff-2aa623b26c7b"
          ENVIRONMENT_ID="b5f83c4b-0081-460a-8038-c63e9caa3f78"

          # Get latest deployment for service + environment
          DEPLOY_QUERY=$(python3 -c "
          import json
          q = {
              'query': '''query(\$serviceId: String!, \$environmentId: String!) {
                  deployments(
                      input: { serviceId: \$serviceId, environmentId: \$environmentId }
                      first: 1
                  ) {
                      edges {
                          node {
                              id
                              status
                              createdAt
                          }
                      }
                  }
              }''',
              'variables': {'serviceId': '$SERVICE_ID', 'environmentId': '$ENVIRONMENT_ID'}
          }
          print(json.dumps(q))
          ")

          DEPLOYMENTS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$DEPLOY_QUERY")

          echo "Deployments response: $DEPLOYMENTS"

          DEPLOY_ID=$(echo "$DEPLOYMENTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          edges = data.get('data', {}).get('deployments', {}).get('edges', [])
          if edges:
              print(edges[0]['node']['id'])
          " 2>/dev/null || echo "")

          DEPLOY_STATUS=$(echo "$DEPLOYMENTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          edges = data.get('data', {}).get('deployments', {}).get('edges', [])
          if edges:
              print(edges[0]['node']['status'])
          " 2>/dev/null || echo "UNKNOWN")

          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT

          # If failed, fetch logs
          ERROR_LOG=""
          if [ "$DEPLOY_STATUS" = "FAILED" ] || [ "$DEPLOY_STATUS" = "CRASHED" ]; then
            if [ -n "$DEPLOY_ID" ]; then
              LOG_QUERY=$(python3 -c "
          import json
          q = {
              'query': '''query(\$deploymentId: String!) {
                  deploymentLogs(deploymentId: \$deploymentId, limit: 100) {
                      message
                      severity
                      timestamp
                  }
              }''',
              'variables': {'deploymentId': '$DEPLOY_ID'}
          }
          print(json.dumps(q))
              ")

              LOGS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
                -H "Authorization: Bearer $RAILWAY_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$LOG_QUERY")

              ERROR_LOG=$(echo "$LOGS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          entries = data.get('data', {}).get('deploymentLogs', [])
          lines = [e.get('message','') for e in entries if e.get('message')]
          print('\n'.join(lines[-80:]))
          " 2>/dev/null || echo "Could not fetch logs")
            fi
          fi

          # Write deploy-status.json
          python3 -c "
          import json, sys
          status = '$DEPLOY_STATUS'
          error_log = sys.argv[1] if len(sys.argv) > 1 else ''
          deploy_id = '$DEPLOY_ID'
          result = {
              'status': status,
              'deploy_id': deploy_id,
              'project_id': 'c6b32bb9-cb3c-454e-aab3-1b8ecefa320a',
              'service_id': '73341e75-b9ea-412c-b0ff-2aa623b26c7b',
              'checked_at': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'trigger_sha': '${{ github.sha }}'
          }
          if error_log:
              result['error_log'] = error_log
          with open('deploy-status.json', 'w') as f:
              json.dump(result, f, indent=2)
          " "$ERROR_LOG"

          echo "Wrote deploy-status.json with status=$DEPLOY_STATUS"

      - name: Commit and push deploy-status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy-status.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update deploy-status.json [skip ci]"
            git push origin claude/setup-md-mortgage-automation-VQ7KG
          fi
