name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck is wired but kept off the required path until
      # next.config.ts:typescript.ignoreBuildErrors is removed and the
      # 4 known type errors are fixed (see tech-lead audit). Flip the
      # comment block once that follow-up PR lands.
      # - name: Typecheck
      #   run: npm run typecheck
